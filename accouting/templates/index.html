<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Manager - Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        header h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .card h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #34495e;
            font-weight: 500;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #27ae60;
            color: white;
        }

        .btn-primary:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: #3498db;
            color: white;
        }

        .btn-secondary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-warning {
            background: #f39c12;
            color: white;
        }

        .btn-warning:hover {
            background: #d68910;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .statistics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .bills-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .bill-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .bill-item:hover {
            background: #ecf0f1;
            transform: translateX(5px);
        }

        .bill-info {
            flex: 1;
        }

        .bill-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .bill-details {
            font-size: 13px;
            color: #7f8c8d;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .bill-amount {
            font-size: 18px;
            font-weight: bold;
            color: #27ae60;
            margin-right: 15px;
        }

        .bill-actions {
            display: flex;
            gap: 5px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #3498db;
            color: white;
        }

        .btn-edit:hover {
            background: #2980b9;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .btn-delete:hover {
            background: #c0392b;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #7f8c8d;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-active {
            background: #d4edda;
            color: #155724;
        }

        .badge-inactive {
            background: #f8d7da;
            color: #721c24;
        }

        .frequency-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            background: #e8f4f8;
            color: #0c5460;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>💰 Bill Manager</h1>
            <p>Manage your recurring bills easily</p>
        </header>

        <!-- Statistics -->
        <div class="statistics">
            <div class="stat-box">
                <div class="stat-label">Monthly Total</div>
                <div class="stat-value" id="monthlyTotal">$0.00</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Yearly Total</div>
                <div class="stat-value" id="yearlyTotal">$0.00</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Form Section -->
            <div class="card">
                <h2>Add/Edit Bill</h2>
                <div id="formAlert" class="alert"></div>

                <form id="billForm">
                    <div class="form-group">
                        <label for="billName">Bill Name *</label>
                        <input type="text" id="billName" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="billAmount">Amount *</label>
                        <input type="number" id="billAmount" name="amount" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="billFrequency">Frequency *</label>
                        <select id="billFrequency" name="frequency" required>
                            <option value="weekly">Weekly</option>
                            <option value="bi-weekly">Bi-weekly</option>
                            <option value="monthly" selected>Monthly</option>
                            <option value="quarterly">Quarterly</option>
                            <option value="yearly">Yearly</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="billDueDate">Due Date (1-31) *</label>
                        <input type="number" id="billDueDate" name="due_date" min="1" max="31" required>
                    </div>

                    <div class="form-group">
                        <label for="billCategory">Category</label>
                        <input type="text" id="billCategory" name="category" placeholder="e.g., Utilities, Subscriptions">
                    </div>

                    <div class="form-group">
                        <label for="billPaymentMethod">Payment Method</label>
                        <input type="text" id="billPaymentMethod" name="payment_method" placeholder="e.g., Credit Card, Bank Transfer">
                    </div>

                    <div class="form-group">
                        <label for="billStatus">Status</label>
                        <select id="billStatus" name="status">
                            <option value="active" selected>Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="billNotes">Notes</label>
                        <textarea id="billNotes" name="notes" placeholder="Additional information..."></textarea>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary" id="submitBtn">Add Bill</button>
                        <button type="button" class="btn-warning" id="clearBtn">Clear</button>
                    </div>
                </form>
            </div>

            <!-- Bills List Section -->
            <div class="card">
                <h2>Bills</h2>
                <div id="billsAlert" class="alert"></div>
                <div id="billsList" class="bills-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading bills...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let currentEditId = null;

        // ==================== INITIALIZATION ====================

        document.addEventListener('DOMContentLoaded', function() {
            loadBills();
            loadStatistics();
            setupEventListeners();
        });

        // ==================== EVENT LISTENERS ====================

        function setupEventListeners() {
            document.getElementById('billForm').addEventListener('submit', handleFormSubmit);
            document.getElementById('clearBtn').addEventListener('click', clearForm);
        }

        // ==================== FORM HANDLING ====================

        function handleFormSubmit(e) {
            e.preventDefault();

            const formData = {
                name: document.getElementById('billName').value,
                amount: parseFloat(document.getElementById('billAmount').value),
                frequency: document.getElementById('billFrequency').value,
                due_date: parseInt(document.getElementById('billDueDate').value),
                category: document.getElementById('billCategory').value,
                payment_method: document.getElementById('billPaymentMethod').value,
                status: document.getElementById('billStatus').value,
                notes: document.getElementById('billNotes').value
            };

            if (currentEditId) {
                updateBill(currentEditId, formData);
            } else {
                createBill(formData);
            }
        }

        function clearForm() {
            document.getElementById('billForm').reset();
            currentEditId = null;
            document.getElementById('submitBtn').textContent = 'Add Bill';
        }

        // ==================== API CALLS ====================

        async function loadBills() {
            try {
                const response = await fetch(`${API_BASE}/bills`);
                const data = await response.json();

                if (data.success) {
                    displayBills(data.bills);
                } else {
                    showAlert('billsAlert', 'error', 'Failed to load bills');
                }
            } catch (error) {
                showAlert('billsAlert', 'error', 'Error loading bills: ' + error.message);
            }
        }

        async function loadStatistics() {
            try {
                const response = await fetch(`${API_BASE}/statistics`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('monthlyTotal').textContent = '$' + data.monthly_total.toFixed(2);
                    document.getElementById('yearlyTotal').textContent = '$' + data.yearly_total.toFixed(2);
                }
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }

        async function createBill(formData) {
            try {
                const response = await fetch(`${API_BASE}/bills`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('formAlert', 'success', 'Bill added successfully!');
                    clearForm();
                    loadBills();
                    loadStatistics();
                } else {
                    showAlert('formAlert', 'error', data.error);
                }
            } catch (error) {
                showAlert('formAlert', 'error', 'Error creating bill: ' + error.message);
            }
        }

        async function updateBill(billId, formData) {
            try {
                const response = await fetch(`${API_BASE}/bills/${billId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('formAlert', 'success', 'Bill updated successfully!');
                    clearForm();
                    loadBills();
                    loadStatistics();
                } else {
                    showAlert('formAlert', 'error', data.error);
                }
            } catch (error) {
                showAlert('formAlert', 'error', 'Error updating bill: ' + error.message);
            }
        }

        async function deleteBill(billId) {
            if (!confirm('Are you sure you want to delete this bill?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/bills/${billId}`, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('billsAlert', 'success', 'Bill deleted successfully!');
                    loadBills();
                    loadStatistics();
                } else {
                    showAlert('billsAlert', 'error', data.error);
                }
            } catch (error) {
                showAlert('billsAlert', 'error', 'Error deleting bill: ' + error.message);
            }
        }

        async function editBill(billId) {
            try {
                const response = await fetch(`${API_BASE}/bills/${billId}`);
                const data = await response.json();

                if (data.success) {
                    const bill = data.bill;
                    document.getElementById('billName').value = bill.name;
                    document.getElementById('billAmount').value = bill.amount;
                    document.getElementById('billFrequency').value = bill.frequency;
                    document.getElementById('billDueDate').value = bill.due_date;
                    document.getElementById('billCategory').value = bill.category || '';
                    document.getElementById('billPaymentMethod').value = bill.payment_method || '';
                    document.getElementById('billStatus').value = bill.status;
                    document.getElementById('billNotes').value = bill.notes || '';

                    currentEditId = billId;
                    document.getElementById('submitBtn').textContent = 'Update Bill';

                    // Scroll to form
                    document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
                }
            } catch (error) {
                showAlert('billsAlert', 'error', 'Error loading bill: ' + error.message);
            }
        }

        // ==================== UI HELPERS ====================

        function displayBills(bills) {
            const billsList = document.getElementById('billsList');

            if (bills.length === 0) {
                billsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>No bills yet. Add one to get started!</p>
                    </div>
                `;
                return;
            }

            billsList.innerHTML = bills.map(bill => `
                <div class="bill-item">
                    <div class="bill-info">
                        <div class="bill-name">${escapeHtml(bill.name)}</div>
                        <div class="bill-details">
                            <span><strong>Amount:</strong> $${bill.amount.toFixed(2)}</span>
                            <span class="frequency-badge">${bill.frequency}</span>
                            <span><strong>Due:</strong> ${bill.due_date}</span>
                            ${bill.category ? `<span><strong>Category:</strong> ${escapeHtml(bill.category)}</span>` : ''}
                            <span class="badge ${bill.status === 'active' ? 'badge-active' : 'badge-inactive'}">${bill.status}</span>
                        </div>
                    </div>
                    <div class="bill-amount">$${bill.amount.toFixed(2)}</div>
                    <div class="bill-actions">
                        <button class="btn-small btn-edit" onclick="editBill(${bill.id})">Edit</button>
                        <button class="btn-small btn-delete" onclick="deleteBill(${bill.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function showAlert(elementId, type, message) {
            const alert = document.getElementById(elementId);
            alert.className = `alert ${type}`;
            alert.textContent = message;

            if (type === 'success') {
                setTimeout(() => {
                    alert.className = 'alert';
                }, 3000);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
