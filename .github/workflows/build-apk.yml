name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libssl-dev \
          libffi-dev \
          python3-dev \
          openjdk-17-jdk \
          android-sdk \
          android-sdk-platform-tools
    
    - name: Set up Android SDK and accept licenses
      run: |
        mkdir -p ~/.android
        
        # Create buildozer cache directory with licenses pre-accepted
        mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n8933bad161af4d5d5c2185173dd8f0b13d7d3a92" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" > ~/.buildozer/android/platform/android-sdk/licenses/intel-android-extra-license
    
    - name: Build APK with buildozer
      working-directory: ./accouting
      env:
        ANDROID_SDK_ROOT: ${{ runner.workspace }}/android-sdk
      run: |
        buildozer android debug 2>&1 | tee build.log || true
        
        # Check if APK was created
        if [ -f bin/billmanager-1.0-debug.apk ]; then
          echo "APK built successfully!"
        else
          echo "APK build failed, checking logs..."
          tail -100 build.log
          exit 1
        fi
     
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: billmanager-apk
        path: accouting/bin/*.apk
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: accouting/bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
